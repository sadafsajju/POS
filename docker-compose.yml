version: '3.8'

# Local development only. Production uses Supabase Cloud + Vercel.
# For local Supabase: npx supabase start (uses Docker internally)
# This file is kept for optional standalone Postgres if needed.

services:
  postgres:
    image: postgres:15-alpine
    container_name: pos-postgres
    environment:
      POSTGRES_DB: pos_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pos_system"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
