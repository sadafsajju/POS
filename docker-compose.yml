version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: pos-postgres
    environment:
      POSTGRES_DB: pos_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - pos-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pos_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and real-time
  redis:
    image: redis:7-alpine
    container_name: pos-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - pos-network
    command: redis-server --appendonly yes
    restart: unless-stopped

  # Golang Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pos-backend
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres123
      - DB_NAME=pos_system
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=8080
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - pos-network
    volumes:
      - ./backend:/app
      - ./uploads:/root/uploads
    restart: unless-stopped

  # Web Admin Dashboard (can also serve as POS in browser)
  web-admin:
    build:
      context: ./apps/desktop
      dockerfile: Dockerfile
    container_name: pos-web-admin
    environment:
      - VITE_API_URL=http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - pos-network
    volumes:
      - ./apps/desktop:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  pos-network:
    driver: bridge
